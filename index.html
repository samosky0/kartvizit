<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Ad Soyad</title>
<meta name="theme-color" content="#0d1013">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1013;
    --bg-glow:#161c22;
    --card:#f5efe2;
    --card-edge:#e6dcc6;
    --ink:#20201c;
    --ink-soft:#6b6558;
    --brass:#a8752f;
    --brass-deep:#7c551f;
    --whatsapp:#3fae5c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background:
      radial-gradient(120% 90% at 50% -10%, var(--bg-glow) 0%, var(--bg) 55%) fixed;
    font-family:'Inter', sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 18px;
  }

  .card{
    position:relative;
    width:100%;
    max-width:380px;
    background:var(--card);
    border-radius:18px;
    padding:38px 26px 30px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.5) inset,
      0 30px 60px -20px rgba(0,0,0,.65),
      0 10px 20px -10px rgba(0,0,0,.5);
    transform:rotate(-0.6deg);
    border:1px solid var(--card-edge);
  }
  .card::before{
    content:"";
    position:absolute; inset:0;
    border-radius:18px;
    background-image:radial-gradient(rgba(0,0,0,.035) 1px, transparent 1px);
    background-size:3px 3px;
    pointer-events:none;
  }
  .card::after{
    content:"";
    position:absolute; top:14px; right:14px;
    width:9px; height:9px;
    border-radius:50%;
    background:var(--brass);
    box-shadow:0 0 0 3px rgba(168,117,47,.18);
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--brass-deep);
    margin:0 0 10px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(28px, 8vw, 34px);
    line-height:1.08;
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  .unvan{
    font-size:14px;
    color:var(--ink-soft);
    margin:0 0 26px;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:22px;
  }
  .btn{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid rgba(0,0,0,.08);
    background:#fff;
    color:var(--ink);
    text-decoration:none;
    font-weight:500;
    font-size:15px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:active{ transform:scale(.97); }
  .btn svg{ width:20px; height:20px; flex-shrink:0; }
  .btn .arrow{ margin-left:auto; opacity:.35; width:16px; height:16px; }

  .btn.ig{ background:linear-gradient(135deg,#fdf2e9,#fbeee0); }
  .btn.ig svg{ color:#c1447e; }
  .btn.wa svg{ color:var(--whatsapp); }

  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:22px 0 14px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:.14em;
    text-transform:uppercase;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--card-edge);
  }

  .iban-box{
    background:#fff;
    border:1px dashed var(--card-edge);
    border-radius:12px;
    padding:16px;
    text-align:center;
  }
  .iban-banka{
    font-size:12px;
    color:var(--ink-soft);
    margin:0 0 8px;
  }
  .iban-num{
    font-family:'IBM Plex Mono', monospace;
    font-size:15px;
    letter-spacing:.03em;
    word-break:break-all;
    margin:0 0 14px;
  }
  .copy-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:none;
    background:var(--brass);
    color:#fff;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:13px;
    padding:10px 18px;
    border-radius:999px;
    cursor:pointer;
    transition:background .2s ease, transform .15s ease;
  }
  .copy-btn:active{ transform:scale(.96); }
  .copy-btn.copied{ background:var(--whatsapp); }
  .copy-btn svg{ width:14px; height:14px; }

  footer{
    text-align:center;
    margin-top:24px;
    font-size:11px;
    color:rgba(255,255,255,.25);
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:.08em;
  }
</style>
</head>
<body>

  <div class="card">
    <p class="eyebrow"></p>
    <h1 id="adSoyad">Ad Soyad</h1>
    <p class="unvan" id="unvan">Buraya kısa bir açıklama</p>

    <div class="links">
      <a class="btn ig" id="igLink" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1"/></svg>
        Instagram'da takip et
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>
      </a>
      <a class="btn wa" id="waLink" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.9 9.9 0 0 0 4.75 1.21h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.45 17.5 2 12.04 2zm5.8 14.15c-.24.68-1.4 1.3-1.93 1.38-.5.08-1.09.11-1.76-.11-.4-.13-.92-.3-1.58-.59-2.78-1.2-4.6-4.01-4.74-4.2-.14-.19-1.13-1.5-1.13-2.87s.71-2.04.96-2.32c.25-.28.55-.35.73-.35h.53c.17 0 .4-.06.62.48.24.57.8 1.98.87 2.12.07.14.11.31.02.5-.09.19-.14.31-.28.47-.14.16-.29.36-.42.48-.14.14-.28.29-.12.57.16.28.72 1.19 1.55 1.93 1.06.95 1.96 1.24 2.24 1.38.28.14.44.12.6-.07.16-.19.68-.79.87-1.06.19-.28.37-.23.62-.14.26.09 1.63.77 1.91.91.28.14.47.21.53.33.07.12.07.68-.17 1.36z"/></svg>
        WhatsApp'tan yaz
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>
      </a>
    </div>

    <div class="divider">Banka Bilgisi</div>

    <div class="iban-box">
      <p class="iban-banka" id="bankaAdi">Banka Adı</p>
      <p class="iban-num" id="ibanText">TR00 0000 0000 0000 0000 0000 00</p>
      <button class="copy-btn" id="copyBtn" onclick="copyIban()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        <span id="copyLabel">IBAN'ı kopyala</span>
      </button>
    </div>

    <footer id="yearFooter"></footer>
  </div>

<script>
/* =========================================================
   BURAYI DÜZENLE — kendi bilgilerini yaz
   ========================================================= */
const bilgiler = {
  adSoyad: "Eren ÖRENTAŞ",
  unvan: "",       // İstemiyorsan boş bırak: ""
  instagramKullanici: "eren_ornts",       // Başında @ olmadan
  whatsappNumara: "905444594602",           // Başında 0 olmadan, ülke koduyla (90...)
  whatsappMesaj: "Selam",
  ibanNumara: "TR19 0004 6000 0688 8000 3590 77",
  bankaAdi: ""                     // İstemiyorsan boş bırak: ""
};
/* ========================================================= */

document.getElementById('adSoyad').textContent = bilgiler.adSoyad;
document.title = bilgiler.adSoyad;

const unvanEl = document.getElementById('unvan');
if (bilgiler.unvan) { unvanEl.textContent = bilgiler.unvan; }
else { unvanEl.remove(); }

document.getElementById('igLink').href = "https://instagram.com/" + encodeURIComponent(bilgiler.instagramKullanici);

const waNumaraTemiz = bilgiler.whatsappNumara.replace(/\D/g, '');
document.getElementById('waLink').href = "https://wa.me/" + waNumaraTemiz + "?text=" + encodeURIComponent(bilgiler.whatsappMesaj);

const bankaEl = document.getElementById('bankaAdi');
if (bilgiler.bankaAdi) { bankaEl.textContent = bilgiler.bankaAdi; }
else { bankaEl.remove(); }

document.getElementById('ibanText').textContent = bilgiler.ibanNumara;

document.getElementById('yearFooter').textContent = new Date().getFullYear();

function copyIban(){
  const iban = bilgiler.ibanNumara.replace(/\s+/g, '');
  const btn = document.getElementById('copyBtn');
  const label = document.getElementById('copyLabel');

  const done = () => {
    btn.classList.add('copied');
    label.textContent = 'Kopyalandı';
    setTimeout(() => {
      btn.classList.remove('copied');
      label.textContent = "IBAN'ı kopyala";
    }, 1800);
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(iban).then(done).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }

  function fallbackCopy(){
    const ta = document.createElement('textarea');
    ta.value = iban;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    done();
  }
}
</script>
</body>
</html>
